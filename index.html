  <!--
      TYPOGRAPHY SYSTEM — Gotham City Jewelers (Brand Book pg. 7)
      ─────────────────────────────────────────────────────────────
      Display:  Cormorant Garamond — ultra-refined French-cut serif.
                Extreme thin strokes in italic. Used by Hermès, Cartier.
                --f-display in tokens.css
      Body:     Josefin Sans       — precision geometric sans-serif.
                Light 300 for body, 400 UI, 600 CTAs. Engraved metal at 9px.
                --f-body / --f-label in tokens.css
    -->

  <!-- Hero images: preload the first slide so it paints instantly -->
  <link rel="preload" as="image" href="/assets/gotham-hero-diamond-ring.jpg" fetchpriority="high" />
  <link rel="prefetch" as="image" href="/assets/gotham-store-interior-1.jpg" />
  <link rel="prefetch" as="image" href="/assets/editorial-wrist.jpg" />

  <!-- Google Fonts — Cormorant Garamond (display) + Josefin Sans (body/labels) -->
