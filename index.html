      TYPOGRAPHY SYSTEM — Gotham City Jewelers
      ─────────────────────────────────────────
      Display:  Bodoni Moda   — Didone optical-size variable font (Google Fonts).

                                (intentional). 300–700 weights. Pairs perfectly.
      Labels:   Clash Display  — Fontshare geometric caps. At 9px + 0.42em tracking
                                it reads like stone-carved building inscription.
